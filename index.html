<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030508">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Elite Finance Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030508; color: #f8fafc; }
        .is-hidden { display: none !important; }
        .glass { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-4 md:p-10">

    <div id="authScreen" class="fixed inset-0 z-[100] bg-[#030508] flex items-center justify-center p-6">
        <div class="glass w-full max-w-md p-10 rounded-[3rem] text-center">
            <h2 class="text-3xl font-black uppercase mb-8">Elite<span class="text-indigo-500">Finance</span></h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="E-MAIL" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none text-white font-bold">
                <input type="password" id="password" placeholder="SENHA" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none text-white font-bold">
                <button onclick="handleAuth()" id="btnAuth" class="w-full bg-white text-black font-black py-5 rounded-2xl uppercase text-[10px] shadow-xl">Acessar Conta</button>
            </div>
        </div>
    </div>

    <div id="mainDashboard" class="is-hidden">
        <h1 class="text-white">Logado com sucesso!</h1>
        <button onclick="handleLogout()" class="bg-rose-500 p-4 rounded-xl mt-4">Sair</button>
    </div>

    <script>
        // URL extraída da sua imagem
        const SUPABASE_URL = 'https://tvnemrwsgfzpfgirtfva.supabase.co'; 
        // Use a chave COMPLETA da sua imagem
        const SUPABASE_KEY = 'sb_publishable_igDsMzHuO2e9iiz6MagFLg_ihjk276D'; 

        let supabaseClient;
        let user = null;

        window.onload = () => {
            try {
                supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                checkSession();
            } catch (e) {
                console.error("Erro ao conectar:", e);
            }
        };

        async function checkSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) { user = session.user; showApp(); }
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnAuth');
            btn.innerText = "CONECTANDO...";

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            
            if (error) {
                const { error: signUpError } = await supabaseClient.auth.signUp({ email, password });
                if (signUpError) alert("Erro: " + signUpError.message);
                else alert("Verifique seu e-mail para confirmar o cadastro!");
            } else {
                user = data.user;
                showApp();
            }
            btn.innerText = "Acessar Conta";
        }

        function showApp() {
            document.getElementById('authScreen').classList.add('is-hidden');
            document.getElementById('mainDashboard').classList.remove('is-hidden');
        }

        async function handleLogout() {
            await supabaseClient.auth.signOut();
            location.reload();
        }
    </script>
</body>
</html>
