<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030508">
    <title>Elite Finance Pro | Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030508; color: #f8fafc; }
        .glass { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.03); }
        .is-hidden { display: none !important; }
        .card-main { background-color: #0b101a; border-radius: 2.5rem; border: 1px solid rgba(255, 255, 255, 0.05); }
        .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.6s ease; opacity: 0; }
        .is-expanded .expandable-content { max-height: 2000px; opacity: 1; margin-top: 1.5rem; }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- TELA DE LOGIN -->
    <div id="authScreen" class="fixed inset-0 z-[100] bg-black flex items-center justify-center p-6">
        <div class="glass w-full max-w-md p-10 rounded-[3rem] text-center">
            <div class="w-20 h-20 bg-indigo-600 rounded-3xl mx-auto mb-6 flex items-center justify-center">
                <i data-lucide="shield-check" class="text-white w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black uppercase tracking-tighter mb-2">Elite Finance</h2>
            <p class="text-slate-500 text-sm mb-8">Sincronização em Nuvem</p>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="E-mail" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none text-white font-bold">
                <input type="password" id="password" placeholder="Senha" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl outline-none text-white font-bold">
                <button onclick="handleLogin()" class="w-full bg-white text-black font-black py-4 rounded-2xl uppercase text-xs active:scale-95 transition-all">Entrar / Cadastrar</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD PRINCIPAL (Escondido até logar) -->
    <div id="mainDashboard" class="is-hidden">
        <header class="max-w-7xl mx-auto flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-slate-900 rounded-2xl overflow-hidden border border-white/5">
                    <img src="icon.png" class="w-full h-full object-cover">
                </div>
                <h1 class="text-xl font-black uppercase">Elite<span class="text-indigo-500">Finance</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="handleLogout()" class="text-slate-500 p-3"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                <button onclick="openModal('modalCard')" class="bg-indigo-600 text-white font-black px-5 py-3 rounded-xl uppercase text-[10px]">+ Novo</button>
            </div>
        </header>

        <!-- INDICADORES -->
        <section id="stats" class="max-w-7xl mx-auto flex gap-4 overflow-x-auto pb-4 mb-10 no-scrollbar">
            <!-- Renderizado via JS -->
        </section>

        <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="cardsGrid"></main>
    </div>

    <!-- MODAL NOVO CARTÃO -->
    <div id="modalCard" class="fixed inset-0 bg-black/95 backdrop-blur-xl z-50 hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-lg rounded-[3rem] p-10">
            <h3 class="text-xl font-black mb-8 uppercase text-center">Novo Cartão</h3>
            <div class="space-y-4">
                <select id="bankSelect" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-white font-bold">
                    <option value="Neon">Neon</option><option value="Nubank">Nubank</option><option value="C6">C6 Bank</option>
                    <option value="PicPay">PicPay</option><option value="Santander">Santander</option><option value="Inter">Inter</option>
                </select>
                <input type="text" id="cardUse" placeholder="Finalidade" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-white font-bold uppercase">
                <input type="number" id="cardLimit" placeholder="Limite Total R$" class="w-full bg-slate-900 border border-slate-800 p-4 rounded-2xl text-white font-bold">
                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal('modalCard')" class="flex-1 text-slate-500 font-bold uppercase text-xs">Cancelar</button>
                    <button onclick="addCard()" class="flex-1 bg-white text-black font-black py-4 rounded-2xl uppercase text-xs">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURAÇÃO SUPABASE
        // Atualize estas linhas no seu index.html
const SUPABASE_URL = 'https://tvnemrwsgfzpgirtfva.supabase.co';
const SUPABASE_KEY = 'sb_publishable_igDsMzHu02e9iiz6MagFLg_ihjk2...'; // Aquela chave da imagem anterior
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;

        // AUTH LOGIC
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                // Tenta cadastrar se não existir
                const { data: signUpData, error: signUpError } = await supabase.auth.signUp({ email, password });
                if (signUpError) return alert(signUpError.message);
                alert("Verifique seu e-mail para confirmar o cadastro!");
            } else {
                currentUser = data.user;
                showDashboard();
            }
        }

        async function handleLogout() {
            await supabase.auth.signOut();
            location.reload();
        }

        function showDashboard() {
            document.getElementById('authScreen').classList.add('is-hidden');
            document.getElementById('mainDashboard').classList.remove('is-hidden');
            loadData();
        }

        // DATA LOGIC (CLOUD SYNC)
        async function loadData() {
            const { data: cartoes } = await supabase.from('cartoes').select('*').order('created_at', { ascending: false });
            const { data: txs } = await supabase.from('transacoes').select('*').order('date', { ascending: false });
            render(cartoes || [], txs || []);
        }

        async function addCard() {
            const bank = document.getElementById('bankSelect').value;
            const use_name = document.getElementById('cardUse').value.toUpperCase();
            const card_limit = parseFloat(document.getElementById('cardLimit').value);
            
            await supabase.from('cartoes').insert([{ user_id: currentUser.id, bank, use_name, card_limit }]);
            closeModal('modalCard');
            loadData();
        }

        async function addExpense(cardId) {
            const desc = document.getElementById(`desc-${cardId}`).value;
            const amount = parseFloat(document.getElementById(`val-${cardId}`).value);
            const date = document.getElementById(`date-${cardId}`).value;
            const category_id = document.getElementById(`cat-${cardId}`).value;

            await supabase.from('transacoes').insert([{ user_id: currentUser.id, card_id: cardId, description: desc, amount, date, category_id }]);
            // Atualizar gasto no cartão (simplificado)
            loadData();
        }

        // Mantenha as funções de renderização (render, toggleExpand, etc) adaptadas para os nomes das colunas do Supabase
        // ... (Logística de UI similar à anterior, mas puxando do 'data' do banco) ...
        
        lucide.createIcons();
    </script>
</body>
</html>
