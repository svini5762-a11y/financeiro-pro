<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA SETTINGS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EliteFinance">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%234f46e5'/><path d='M50 25L75 35V55C75 70 50 80 50 80C50 80 25 70 25 55V35L50 25Z' fill='white'/></svg>">

    <title>Finance Elite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030508; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.03); }
        
        /* MOBILE OPTIMIZATION: Horizontal Scroll for Indicators */
        @media (max-width: 768px) {
            .stats-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 1rem; padding-bottom: 1rem; }
            .stats-card { min-width: 85%; scroll-snap-align: center; padding: 1.5rem !important; }
            .card-main { padding: 1.5rem !important; border-radius: 2rem !important; }
            .card-main h2 { font-size: 1.875rem !important; }
        }

        .card-main { background-color: #0b101a; border-radius: 3rem; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; opacity: 0; }
        .is-expanded .expandable-content { max-height: 1500px; opacity: 1; margin-top: 1.5rem; }
        .custom-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto flex justify-between items-center mb-8">
        <div class="flex items-center gap-3">
            <div class="p-2 bg-indigo-600 rounded-xl shadow-lg"><i data-lucide="shield-check" class="text-white w-5 h-5"></i></div>
            <h1 class="text-xl font-black tracking-tighter uppercase">Elite<span class="text-indigo-500">Finance</span></h1>
        </div>
        <button onclick="openModal('modalCard')" class="bg-indigo-600 text-white font-black px-5 py-3 rounded-xl text-[10px] uppercase shadow-lg active:scale-95 transition-transform">
            + Novo Cartão
        </button>
    </header>

    <!-- INDICADORES: Carrossel no Mobile -->
    <section class="max-w-7xl mx-auto stats-container mb-10 custom-scroll">
        <div class="glass p-6 rounded-[2rem] stats-card">
            <span class="text-[9px] font-black text-slate-500 uppercase mb-2 block">Total Gasto</span>
            <h2 id="totalSpent" class="text-xl font-black tracking-tight text-white">R$ 0,00</h2>
        </div>
        <div class="glass p-6 rounded-[2rem] stats-card">
            <span class="text-[9px] font-black text-emerald-500 uppercase mb-2 block">Disponível</span>
            <h2 id="totalAvailable" class="text-xl font-black text-emerald-400">R$ 0,00</h2>
        </div>
        <div class="glass p-6 rounded-[2rem] stats-card">
            <span class="text-[9px] font-black text-rose-500 uppercase mb-2 block">Dívida Ativa</span>
            <h2 id="activeDebt" class="text-xl font-black text-rose-500">R$ 0,00</h2>
        </div>
        <div class="glass p-6 rounded-[2rem] stats-card">
            <span class="text-[9px] font-black text-slate-500 uppercase mb-2 block">Saúde</span>
            <h2 id="exceededStatus" class="text-[10px] font-black text-emerald-400 uppercase mt-1">Perfeita ✓</h2>
        </div>
    </section>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="cardsGrid"></main>

    <!-- O RESTANTE DO SCRIPT E MODAIS CONTINUAM IGUAIS -->
    <!-- ... (Adicione aqui o modal e a lógica de JS das respostas anteriores) ... -->

    <script>
        // REGISTRO DE SERVICE WORKER PARA ABRIR INSTANTÂNEO
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:text/javascript;base64,' + btoa(`
                self.addEventListener('install', (e) => {
                    self.skipWaiting();
                });
                self.addEventListener('fetch', (e) => {
                    e.respondWith(fetch(e.request));
                });
            `));
        }
        
        // ... (Mantenha suas funções addCard, render, etc, aqui) ...
    </script>
</body>
</html>
