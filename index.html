<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- PWA SETTINGS -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="EliteFinance">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#030508">

    <title>Elite Finance Pro | Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030508; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.03); }
        
        /* MOBILE OPTIMIZATION: Carrossel para Indicadores */
        @media (max-width: 768px) {
            .stats-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 1rem; padding-bottom: 1rem; scrollbar-width: none; }
            .stats-container::-webkit-scrollbar { display: none; }
            .stats-card { min-width: 85%; scroll-snap-align: center; }
            .card-main { padding: 1.5rem !important; border-radius: 2.5rem !important; }
        }

        .card-main { background-color: #0b101a; border-radius: 3rem; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s ease; }
        .card-exceeded { border: 2px solid #f43f5e; box-shadow: 0 0 30px rgba(244, 63, 94, 0.1); }
        
        .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.6s ease-in-out, opacity 0.3s; opacity: 0; }
        .is-expanded .expandable-content { max-height: 2000px; opacity: 1; margin-top: 2rem; }
        
        .item-row { background: #111827; border-radius: 1.5rem; border: 1px solid rgba(255, 255, 255, 0.03); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
    </style>
</head>
<body class="p-4 md:p-10 custom-scroll">

    <!-- CABEÇALHO COM A SUA LOGO (hjhgghghjh.png) -->
    <header class="max-w-7xl mx-auto flex justify-between items-center mb-10">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-slate-900 rounded-2xl shadow-lg overflow-hidden flex items-center justify-center border border-white/5">
                <img src="icon.png" alt="Logo" class="w-full h-full object-cover">
            </div>
            <h1 class="text-2xl font-black tracking-tighter uppercase">Elite<span class="text-indigo-500">Finance</span></h1>
        </div>
        <button onclick="openModal('modalCard')" class="bg-indigo-600 hover:bg-indigo-500 text-white font-black px-6 py-4 rounded-2xl shadow-xl transition-all active:scale-95 uppercase text-[10px]">
            + Novo Cartão
        </button>
    </header>

    <!-- INDICADORES GLOBAIS (Deslizáveis no Mobile) -->
    <section class="max-w-7xl mx-auto stats-container mb-12 custom-scroll">
        <div class="glass p-8 rounded-[2.5rem] stats-card">
            <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Total Gasto</span>
            <h2 id="totalSpent" class="text-2xl font-black text-white">R$ 0,00</h2>
        </div>
        <div class="glass p-8 rounded-[2.5rem] stats-card">
            <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-2 block">Disponível</span>
            <h2 id="totalAvailable" class="text-2xl font-black text-emerald-400">R$ 0,00</h2>
        </div>
        <div class="glass p-8 rounded-[2.5rem] stats-card">
            <span class="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-2 block">Dívida Ativa</span>
            <h2 id="activeDebt" class="text-2xl font-black text-rose-500">R$ 0,00</h2>
        </div>
        <div class="glass p-8 rounded-[2.5rem] stats-card">
            <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Saúde Financeira</span>
            <h2 id="exceededStatus" class="text-[10px] font-black text-emerald-400 uppercase mt-1 tracking-tighter">Perfeita ✓</h2>
        </div>
    </section>

    <!-- GRID DE CARTÕES -->
    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="cardsGrid"></main>

    <!-- MODAL NOVO CARTÃO -->
    <div id="modalCard" class="fixed inset-0 bg-black/98 backdrop-blur-2xl z-50 hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-lg rounded-[3.5rem] p-12">
            <h3 class="text-2xl font-black mb-8 tracking-tighter uppercase text-center text-white">Configurar Cartão</h3>
            <div class="space-y-6">
                <select id="bankSelect" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none font-bold text-sm text-white">
                    <option value="Neon">Neon</option>
                    <option value="Nubank">Nubank</option>
                    <option value="C6">C6 Bank</option>
                    <option value="PicPay">PicPay</option>
                    <option value="Santander">Santander</option>
                    <option value="Inter">Inter</option>
                    <option value="Bradesco">Bradesco</option>
                    <option value="Itau">Itaú</option>
                    <option value="BB">Banco do Brasil</option>
                    <option value="Caixa">Caixa</option>
                </select>
                <input type="text" id="cardUse" placeholder="Uso (Ex: Farmácia)" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none uppercase font-bold text-sm text-white">
                <input type="number" id="cardLimit" placeholder="Limite Total R$" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none font-bold text-sm text-white">
                <div class="flex gap-6 pt-6">
                    <button onclick="closeModal('modalCard')" class="flex-1 font-bold text-slate-500 uppercase text-xs">Cancelar</button>
                    <button onclick="addCard()" class="flex-1 bg-white text-black font-black py-4 rounded-2xl hover:bg-indigo-600 hover:text-white transition-all uppercase text-xs">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const bankLogos = {
            Neon: `<circle cx="50" cy="50" r="45" fill="#0ea5e9"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">N</text>`,
            Nubank: `<circle cx="50" cy="50" r="45" fill="#9333ea"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">Nu</text>`,
            C6: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#111"/><text x="50" y="65" text-anchor="middle" fill="#facc15" font-weight="900" font-size="40">C6</text>`,
            PicPay: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#21C25E"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="30">PPay</text>`,
            Santander: `<circle cx="50" cy="50" r="45" fill="#EC0000"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">S</text>`,
            Inter: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#ff7a00"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">In</text>`,
            Bradesco: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#cc092f"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">B</text>`,
            Itau: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#ec6608"/><text x="50" y="65" text-anchor="middle" fill="#003399" font-weight="900" font-size="40">I</text>`,
            BB: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#FCF800"/><text x="50" y="65" text-anchor="middle" fill="#003399" font-weight="900" font-size="40">BB</text>`,
            Caixa: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#005ca9"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">X</text>`
        };

        const allCategories = [
            { id: 'cart', name: 'MERCADO', icon: '🛒' },
            { id: 'pill', name: 'FARMÁCIA', icon: '💊' },
            { id: 'burger', name: 'COMIDA', icon: '🍔' },
            { id: 'gas', name: 'POSTO', icon: '⛽' },
            { id: 'shirt', name: 'ROUPAS', icon: '👕' },
            { id: 'movie', name: 'LAZER', icon: '🎬' },
            { id: 'tech', name: 'TECH', icon: '📱' },
            { id: 'health', name: 'MÉDICO', icon: '🏥' },
            { id: 'home', name: 'CASA', icon: '🏠' },
            { id: 'study', name: 'ESTUDOS', icon: '📚' },
            { id: 'travel', name: 'VIAGEM', icon: '✈️' },
            { id: 'energy', name: 'CONTAS', icon: '💡' },
            { id: 'pets', name: 'PETS', icon: '🐾' },
            { id: 'gift', name: 'PRESENTE', icon: '🎁' },
            { id: 'invest', name: 'INVESTIMENTOS', icon: '💰' }
        ];

        let cards = JSON.parse(localStorage.getItem('elite_pwa_v2')) || [];
        let txs = JSON.parse(localStorage.getItem('tx_pwa_v2')) || [];

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("SW Registered"));
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function toggleExpand(id) {
            const cardEl = document.getElementById(`card-${id}`);
            cardEl.classList.toggle('is-expanded');
            cardEl.querySelector('.toggle-btn').innerText = cardEl.classList.contains('is-expanded') ? 'Fechar Painel' : 'Gerenciar Despesas';
            lucide.createIcons();
        }

        function addCard() {
            const bank = document.getElementById('bankSelect').value;
            const use = document.getElementById('cardUse').value || 'GERAL';
            const limit = parseFloat(document.getElementById('cardLimit').value);
            if(isNaN(limit)) return;
            cards.push({ id: Date.now(), bank, use: use.toUpperCase(), limit, spent: 0 });
            sync(); closeModal('modalCard');
        }

        function addExpense(cardId) {
            const desc = document.getElementById(`desc-${cardId}`).value;
            const val = parseFloat(document.getElementById(`val-${cardId}`).value);
            const date = document.getElementById(`date-${cardId}`).value;
            const catId = document.getElementById(`cat-${cardId}`).value;
            if(!desc || isNaN(val) || !date) return;
            txs.unshift({ id: Date.now(), cardId, desc, val, date, cat: allCategories.find(i => i.id === catId) });
            cards.find(c => c.id === cardId).spent += val;
            sync();
        }

        function deleteTx(txId, cardId) {
            const t = txs.find(x => x.id === txId);
            cards.find(c => c.id === cardId).spent -= t.val;
            txs = txs.filter(x => x.id !== txId);
            sync();
        }

        function deleteCard(id) {
            if(confirm("Excluir este cartão?")) {
                cards = cards.filter(c => c.id !== id);
                txs = txs.filter(t => t.cardId !== id);
                sync();
            }
        }

        function sync() {
            localStorage.setItem('elite_pwa_v2', JSON.stringify(cards));
            localStorage.setItem('tx_pwa_v2', JSON.stringify(txs));
            render();
        }

        function render() {
            const grid = document.getElementById('cardsGrid');
            const tSpent = cards.reduce((a, b) => a + b.spent, 0);
            const tLimit = cards.reduce((a, b) => a + b.limit, 0);
            const exceeded = cards.filter(c => c.spent > c.limit);
            const tDebt = exceeded.reduce((a, b) => a + (b.spent - b.limit), 0);

            document.getElementById('totalSpent').innerText = `R$ ${tSpent.toFixed(2)}`;
            document.getElementById('totalAvailable').innerText = `R$ ${Math.max(0, tLimit - tSpent).toFixed(2)}`;
            document.getElementById('activeDebt').innerText = `R$ ${tDebt.toFixed(2)}`;

            const statusEl = document.getElementById('exceededStatus');
            if(exceeded.length > 0) {
                statusEl.innerText = "ALERTA: DÍVIDA!";
                statusEl.className = "text-[10px] font-black text-rose-500 animate-pulse mt-1 uppercase";
            } else {
                statusEl.innerText = "Saúde Perfeita ✓";
                statusEl.className = "text-[10px] font-black text-emerald-400 mt-1 uppercase";
            }

            grid.innerHTML = cards.map(c => {
                const isOver = c.spent > c.limit;
                const perc = Math.min((c.spent/c.limit)*100, 100);
                const cardTxs = txs.filter(t => t.cardId === c.id);

                return `
                <div id="card-${c.id}" class="card-main p-8 md:p-10 flex flex-col transition-all duration-500 ${isOver ? 'card-exceeded' : ''}">
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex gap-4">
                            <div class="w-14 h-14 bg-white rounded-2xl p-2 flex items-center justify-center">
                                <svg viewBox="0 0 100 100" class="w-full h-full">${bankLogos[c.bank]}</svg>
                            </div>
                            <div>
                                <h4 class="font-black text-xl tracking-tighter uppercase text-white">${c.bank}</h4>
                                <span class="bg-indigo-900/30 text-indigo-400 text-[8px] font-black px-3 py-1 rounded-full uppercase border border-indigo-500/20 tracking-widest">${c.use}</span>
                            </div>
                        </div>
                        <button onclick="deleteCard(${c.id})" class="text-slate-800 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>

                    <div>
                        <h2 class="text-3xl font-black ${isOver ? 'text-rose-500' : 'text-white'}">R$ ${c.spent.toFixed(2)}</h2>
                        <div class="flex justify-between text-[9px] font-black text-slate-500 mt-4 uppercase tracking-widest">
                            <span>USO: ${perc.toFixed(0)}%</span>
                            <span>LIMITE: R$ ${c.limit}</span>
                        </div>
                        <div class="h-2 w-full bg-slate-900 rounded-full mt-4 overflow-hidden">
                            <div class="h-full ${isOver ? 'bg-rose-500' : 'bg-indigo-500'} rounded-full transition-all duration-1000" style="width: ${perc}%"></div>
                        </div>
                    </div>

                    <button onclick="toggleExpand(${c.id})" class="toggle-btn w-full mt-8 py-4 bg-slate-800/40 rounded-2xl text-[9px] font-black text-slate-400 hover:bg-indigo-500/10 hover:text-indigo-400 transition-all uppercase tracking-widest">
                        Gerenciar Despesas
                    </button>

                    <div class="expandable-content">
                        <div class="bg-black/30 rounded-[2rem] p-6 mb-8 border border-white/5 space-y-4 max-h-[300px] overflow-y-auto custom-scroll">
                            ${cardTxs.map(t => `
                                <div class="item-row p-4 flex justify-between items-center group">
                                    <div class="flex items-center gap-4">
                                        <span class="text-xl">${t.cat.icon}</span>
                                        <div>
                                            <p class="text-[10px] font-black uppercase text-slate-200 tracking-tight">${t.desc}</p>
                                            <span class="text-[8px] text-slate-600 font-bold">${t.date.split('-').reverse().join('/')}</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-3">
                                        <span class="text-[10px] font-black text-rose-500">- R$ ${t.val.toFixed(2)}</span>
                                        <button onclick="deleteTx(${t.id}, ${c.id})" class="opacity-0 group-hover:opacity-100 text-slate-700 hover:text-rose-500 transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
                                    </div>
                                </div>
                            `).join('') || '<p class="text-center text-[9px] text-slate-700 font-black py-4 uppercase">Sem Lançamentos</p>'}
                        </div>

                        <div class="space-y-6 pt-6 border-t border-slate-800/50">
                            <input type="text" id="desc-${c.id}" placeholder="Descrição..." class="w-full bg-transparent border-b border-slate-800 py-3 text-xs outline-none focus:border-indigo-500 font-bold text-white placeholder:text-slate-700 uppercase">
                            <div class="grid grid-cols-2 gap-4">
                                <input type="number" id="val-${c.id}" placeholder="Valor R$" class="bg-slate-900 rounded-2xl p-4 border border-slate-800 text-[10px] font-black outline-none text-white">
                                <input type="date" id="date-${c.id}" value="${new Date().toISOString().split('T')[0]}" class="bg-slate-900 rounded-2xl p-4 border border-slate-800 text-[10px] font-bold outline-none text-white">
                            </div>
                            <select id="cat-${c.id}" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 text-[10px] font-black outline-none appearance-none uppercase text-white">
                                ${allCategories.map(cat => `<option value="${cat.id}">${cat.icon} &nbsp; ${cat.name}</option>`).join('')}
                            </select>
                            <button onclick="addExpense(${c.id})" class="w-full bg-white text-black font-black py-5 rounded-[1.5rem] text-[10px] hover:bg-indigo-600 hover:text-white transition-all uppercase tracking-tighter shadow-2xl">Confirmar Lançamento</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        render();
    </script>
</body>
</html>
