<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030508">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <title>Elite Finance Pro | Master Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #030508; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.03); }
        .is-hidden { display: none !important; }
        
        .stats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.25rem; }

        @media (max-width: 1024px) {
            .stats-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 1rem; padding-bottom: 1rem; scrollbar-width: none; }
            .stats-container::-webkit-scrollbar { display: none; }
            .stats-card { min-width: 80%; scroll-snap-align: center; }
        }

        .card-main { background-color: #0b101a; border-radius: 3.5rem; border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.4s ease; }
        .expandable-content { max-height: 0; overflow: hidden; transition: max-height 0.6s ease; opacity: 0; }
        .is-expanded .expandable-content { max-height: 4000px; opacity: 1; margin-top: 1.5rem; }
        
        .item-row { background: #111827; border-radius: 2rem; border: 1px solid rgba(255, 255, 255, 0.02); }
        .icon-box { background: #0b101a; border: 1px solid rgba(255, 255, 255, 0.05); min-width: 4rem; height: 4rem; }
        
        .btn-active:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body class="p-4 md:p-10">

    <!-- LOGIN -->
    <div id="authScreen" class="fixed inset-0 z-[100] bg-[#030508] flex items-center justify-center p-6">
        <div class="glass w-full max-w-md p-10 rounded-[4rem] text-center border-white/5">
            <div class="w-24 h-24 bg-slate-900 rounded-[2.5rem] mx-auto mb-8 flex items-center justify-center border border-white/10 shadow-2xl overflow-hidden">
                <img src="icon.png" class="w-full h-full object-cover">
            </div>
            <h2 class="text-3xl font-black uppercase tracking-tighter mb-2">Elite<span class="text-indigo-500">Finance</span></h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="E-MAIL" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none text-white font-bold text-xs">
                <input type="password" id="password" placeholder="SENHA" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl outline-none text-white font-bold text-xs">
                <button type="button" onclick="handleAuth()" id="btnAuth" class="btn-active w-full bg-white text-black font-black py-5 rounded-2xl uppercase text-[10px] shadow-xl">Acessar Conta</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="mainDashboard" class="is-hidden">
        <header class="max-w-7xl mx-auto flex justify-between items-center mb-10">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-slate-900 rounded-2xl overflow-hidden border border-white/5">
                    <img src="icon.png" class="w-full h-full object-cover">
                </div>
                <h1 class="text-xl font-black uppercase tracking-tighter">Elite<span class="text-indigo-500">Finance</span></h1>
            </div>
            <div class="flex gap-3">
                <button onclick="handleLogout()" class="text-slate-600 p-3"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                <button onclick="openModal('modalCard')" class="bg-indigo-600 text-white font-black px-6 py-4 rounded-2xl uppercase text-[10px] shadow-lg">+ Novo Cartão</button>
            </div>
        </header>

        <section id="statsContainer" class="max-w-7xl mx-auto stats-container mb-12"></section>
        <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="cardsGrid"></main>
    </div>

    <!-- MODAL -->
    <div id="modalCard" class="fixed inset-0 bg-black/98 backdrop-blur-2xl z-50 hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-lg rounded-[4rem] p-12">
            <h3 class="text-2xl font-black mb-8 uppercase text-center text-white tracking-tighter">Novo Cartão</h3>
            <div class="space-y-6">
                <select id="bankSelect" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl text-white font-bold text-sm outline-none">
                    <option value="Neon">Neon</option><option value="Nubank">Nubank</option><option value="C6">C6 Bank</option>
                    <option value="PicPay">PicPay</option><option value="Santander">Santander</option><option value="Inter">Inter</option>
                    <option value="Caixa">Caixa</option><option value="Bradesco">Bradesco</option><option value="Itau">Itaú</option>
                </select>
                <input type="text" id="cardUse" placeholder="EX: PESSOAL" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl text-white font-bold text-sm uppercase outline-none">
                <input type="number" id="cardLimit" placeholder="LIMITE TOTAL R$" class="w-full bg-slate-900 border border-slate-800 p-5 rounded-2xl text-white font-bold text-sm outline-none">
                <div class="flex gap-6 pt-6">
                    <button onclick="closeModal('modalCard')" class="flex-1 font-bold text-slate-500 uppercase text-[10px]">Cancelar</button>
                    <button onclick="addCard()" class="flex-1 bg-white text-black font-black py-5 rounded-2xl uppercase text-[10px] btn-active">Criar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://tvnemrwsgfzpfgirtfva.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_igDsMzHuO2e9iiz6MagFLg_ihjk276D'; 
        
        let _supabase;
        let user = null;

        window.onload = () => {
            _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            checkSession();
            lucide.createIcons();
        };

        async function checkSession() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) { user = session.user; initApp(); }
        }

        async function handleAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (!error) { user = data.user; initApp(); }
        }

        async function handleLogout() { await _supabase.auth.signOut(); location.reload(); }

        function initApp() {
            document.getElementById('authScreen').classList.add('is-hidden');
            document.getElementById('mainDashboard').classList.remove('is-hidden');
            fetchData();
        }

        async function fetchData() {
            const { data: cards } = await _supabase.from('cartoes').select('*').order('created_at');
            const { data: txs } = await _supabase.from('transacoes').select('*').order('date', { ascending: false });
            render(cards || [], txs || []);
        }

        async function addCard() {
            const bank = document.getElementById('bankSelect').value;
            const use_name = (document.getElementById('cardUse').value || 'GERAL').toUpperCase();
            const card_limit = parseFloat(document.getElementById('cardLimit').value);
            await _supabase.from('cartoes').insert([{ user_id: user.id, bank, use_name, card_limit }]);
            closeModal('modalCard');
            fetchData();
        }

        async function deleteCard(id) {
            if(confirm("Deseja apagar este cartão e todas as suas despesas?")) {
                await _supabase.from('cartoes').delete().eq('id', id);
                fetchData();
            }
        }

        async function addExpense(cardId) {
            const desc = document.getElementById(`desc-${cardId}`).value;
            const amount = parseFloat(document.getElementById(`val-${cardId}`).value);
            const date = document.getElementById(`date-${cardId}`).value;
            const category_id = document.getElementById(`cat-${cardId}`).value;
            if(!desc || isNaN(amount)) return;
            await _supabase.from('transacoes').insert([{ user_id: user.id, card_id: cardId, description: desc.toUpperCase(), amount, date, category_id }]);
            fetchData();
        }

        // --- FUNÇÃO PARA REMOVER DESPESA ---
        async function deleteExpense(tId) {
            if(confirm("Excluir este lançamento?")) {
                await _supabase.from('transacoes').delete().eq('id', tId);
                fetchData();
            }
        }

        function toggleExpand(id) {
            document.getElementById(`card-wrap-${id}`).classList.toggle('is-expanded');
            lucide.createIcons();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        const bankLogos = {
            Neon: `<circle cx="50" cy="50" r="45" fill="#0ea5e9"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">N</text>`,
            Nubank: `<circle cx="50" cy="50" r="45" fill="#9333ea"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">Nu</text>`,
            C6: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#111"/><text x="50" y="65" text-anchor="middle" fill="#facc15" font-weight="900" font-size="40">C6</text>`,
            PicPay: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#21C25E"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="30">PPay</text>`,
            Santander: `<circle cx="50" cy="50" r="45" fill="#EC0000"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">S</text>`,
            Inter: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#ff7a00"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">In</text>`,
            Caixa: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#005ca9"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">X</text>`,
            Bradesco: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#cc092f"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">B</text>`,
            Itau: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#ec6608"/><text x="50" y="65" text-anchor="middle" fill="#003399" font-weight="900" font-size="40">I</text>`
        };

        const categories = [
            { id: 'cart', name: 'MERCADO', icon: '🛒' }, { id: 'pill', name: 'FARMÁCIA', icon: '💊' },
            { id: 'burger', name: 'COMIDA', icon: '🍔' }, { id: 'gas', name: 'POSTO', icon: '⛽' },
            { id: 'shirt', name: 'ROUPAS', icon: '👕' }, { id: 'movie', name: 'LAZER', icon: '🎬' },
            { id: 'tech', name: 'TECH', icon: '📱' }, { id: 'health', name: 'MÉDICO', icon: '🏥' },
            { id: 'home', name: 'CASA', icon: '🏠' }, { id: 'study', name: 'ESTUDOS', icon: '📚' },
            { id: 'travel', name: 'VIAGEM', icon: '✈️' }, { id: 'energy', name: 'CONTAS', icon: '💡' },
            { id: 'pets', name: 'PETS', icon: '🐾' }, { id: 'gift', name: 'PRESENTE', icon: '🎁' },
            { id: 'invest', name: 'INVESTIMENTOS', icon: '💰' }
        ];

        function render(cards, txs) {
            const grid = document.getElementById('cardsGrid');
            const globalLimit = cards.reduce((a, b) => a + (b.card_limit || 0), 0);
            let globalSpent = 0;
            let totalDebt = 0;

            const cardsWithTotals = cards.map(c => {
                const spent = txs.filter(t => t.card_id === c.id).reduce((sum, t) => sum + t.amount, 0);
                globalSpent += spent;
                if (spent > c.card_limit) totalDebt += (spent - c.card_limit);
                return { ...c, actualSpent: spent };
            });

            const isExceeded = totalDebt > 0;

            document.getElementById('statsContainer').innerHTML = `
                <div class="glass p-8 rounded-[3rem] stats-card">
                    <span class="text-[9px] font-black text-slate-500 uppercase mb-2 block tracking-widest">Total Gasto</span>
                    <h2 class="text-2xl font-black">R$ ${globalSpent.toFixed(2)}</h2>
                </div>
                <div class="glass p-8 rounded-[3rem] stats-card">
                    <span class="text-[9px] font-black text-emerald-500 uppercase mb-2 block tracking-widest">Disponível</span>
                    <h2 class="text-2xl font-black text-emerald-400">R$ ${Math.max(0, globalLimit - globalSpent).toFixed(2)}</h2>
                </div>
                <div class="glass p-8 rounded-[3rem] stats-card">
                    <span class="text-[9px] font-black text-rose-500 uppercase mb-2 block tracking-widest">Dívida Ativa</span>
                    <h2 class="text-2xl font-black text-rose-500">R$ ${totalDebt.toFixed(2)}</h2>
                </div>
                <div class="glass p-8 rounded-[3rem] stats-card">
                    <span class="text-[9px] font-black text-slate-500 uppercase mb-2 block tracking-widest">Saúde</span>
                    <h2 class="text-[12px] font-black uppercase ${isExceeded ? 'text-rose-500 animate-pulse' : 'text-emerald-400'}">${isExceeded ? 'Crítica' : 'Excelente'}</h2>
                </div>
            `;

            grid.innerHTML = cardsWithTotals.map(c => {
                const perc = Math.min((c.actualSpent/c.card_limit)*100, 100);
                const isOver = c.actualSpent > c.card_limit;
                const cardTxs = txs.filter(t => t.card_id === c.id);

                return `
                <div id="card-wrap-${c.id}" class="card-main p-10 flex flex-col ${isOver ? 'border-rose-500/40 shadow-2xl shadow-rose-500/10' : ''}">
                    <div class="flex justify-between items-start mb-8">
                        <div class="flex gap-5">
                            <div class="w-16 h-16 bg-white rounded-[2rem] p-3 flex items-center justify-center shadow-lg">
                                <svg viewBox="0 0 100 100" class="w-full h-full">${bankLogos[c.bank] || ''}</svg>
                            </div>
                            <div>
                                <h4 class="font-black text-2xl text-white uppercase tracking-tighter">${c.bank}</h4>
                                <span class="bg-indigo-900/40 text-indigo-400 text-[9px] font-black px-4 py-1.5 rounded-full uppercase border border-indigo-500/20 tracking-widest">${c.use_name}</span>
                            </div>
                        </div>
                        <button onclick="deleteCard('${c.id}')" class="text-slate-800 hover:text-rose-500 p-2 transition-all"><i data-lucide="trash-2" class="w-6 h-6"></i></button>
                    </div>

                    <div class="mb-10">
                        <h2 class="text-4xl font-black ${isOver ? 'text-rose-500' : 'text-white'}">R$ ${c.actualSpent.toFixed(2)}</h2>
                        <div class="flex justify-between text-[10px] font-black text-slate-500 mt-5 uppercase tracking-[0.2em]">
                            <span>USO: ${perc.toFixed(0)}%</span>
                            <span>LIMITE: R$ ${c.card_limit}</span>
                        </div>
                        <div class="h-2.5 w-full bg-slate-900 rounded-full mt-4 overflow-hidden">
                            <div class="h-full ${isOver ? 'bg-rose-500' : 'bg-indigo-500'} transition-all duration-1000" style="width: ${perc}%"></div>
                        </div>
                    </div>

                    <button onclick="toggleExpand('${c.id}')" class="w-full py-5 bg-slate-800/40 rounded-3xl text-[10px] font-black text-slate-400 uppercase tracking-[0.3em] hover:bg-indigo-500/10 hover:text-indigo-400 transition-all">Gerenciar Despesas</button>

                    <div class="expandable-content">
                        <div class="bg-black/30 rounded-[3rem] p-6 mb-8 space-y-4 max-h-[500px] overflow-y-auto">
                            ${cardTxs.map(t => `
                                <div class="item-row p-6 flex justify-between items-center group">
                                    <div class="flex items-center gap-6">
                                        <div class="icon-box rounded-3xl flex items-center justify-center shadow-inner">
                                            <span class="text-3xl">${categories.find(cat => cat.id === t.category_id)?.icon || '💰'}</span>
                                        </div>
                                        <div>
                                            <p class="text-[12px] font-black text-slate-100 uppercase tracking-tight">${t.description}</p>
                                            <p class="text-[9px] font-bold text-slate-600 tracking-widest">${t.date.split('-').reverse().join('/')}</p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-6">
                                        <span class="text-[12px] font-black text-rose-500">- R$ ${t.amount.toFixed(2)}</span>
                                        <button onclick="deleteExpense('${t.id}')" class="p-3 -mr-3 text-slate-600 hover:text-rose-500 transition-colors">
                                            <i data-lucide="trash" class="w-5 h-5"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('') || '<p class="text-center text-[10px] text-slate-700 py-12 font-black uppercase tracking-widest">Sem despesas registradas</p>'}
                        </div>

                        <div class="space-y-6 pt-6 border-t border-slate-800/50">
                            <input type="text" id="desc-${c.id}" placeholder="O QUE FOI COMPRADO?" class="w-full bg-transparent border-b border-slate-800 py-4 text-xs text-white uppercase outline-none focus:border-indigo-500 font-bold tracking-widest">
                            <div class="grid grid-cols-2 gap-5">
                                <input type="number" id="val-${c.id}" placeholder="VALOR R$" class="bg-slate-900 rounded-2xl p-5 text-xs text-white font-black outline-none border border-transparent focus:border-indigo-500/50">
                                <input type="date" id="date-${c.id}" value="${new Date().toISOString().split('T')[0]}" class="bg-slate-900 rounded-2xl p-5 text-xs text-white font-bold outline-none border border-transparent focus:border-indigo-500/50">
                            </div>
                            <select id="cat-${c.id}" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-5 text-xs text-white uppercase font-black outline-none">
                                ${categories.map(cat => `<option value="${cat.id}">${cat.icon} &nbsp; ${cat.name}</option>`).join('')}
                            </select>
                            <button onclick="addExpense('${c.id}')" class="btn-active w-full bg-white text-black font-black py-6 rounded-[2.5rem] text-xs uppercase tracking-tighter shadow-2xl">Confirmar Lançamento</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }
    </script>
</body>
</html>
