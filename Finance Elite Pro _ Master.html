<body class="p-4 md:p-10">

    <header class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-6 mb-12">
        <div class="flex items-center gap-4">
            <!-- ÍCONE NO LOGO DO APP -->
            <div class="p-3 bg-indigo-600 rounded-2xl shadow-lg shadow-indigo-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" data-lucide="shield-check" aria-hidden="true" class="lucide lucide-shield-check text-white w-7 h-7"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z"></path><path d="m9 12 2 2 4-4"></path></svg>
            </div>
            <h1 class="text-3xl font-black tracking-tighter uppercase">Elite<span class="text-indigo-500">Finance</span></h1>
        </div>
        <button onclick="openModal(&#39;modalCard&#39;)" class="bg-indigo-600 hover:bg-indigo-500 text-white font-black px-10 py-4 rounded-2xl shadow-xl transition-all active:scale-95 uppercase text-xs">
            + Adicionar Cartão
        </button>
    </header>

    <!-- INDICADORES TÉCNICOS -->
    <section class="max-w-7xl mx-auto grid grid-cols-2 lg:grid-cols-4 gap-6 mb-12">
        <div class="glass p-8 rounded-[2.5rem]">
            <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Total Gasto</span>
            <h2 id="totalSpent" class="text-2xl font-black tracking-tight">R$ 0.00</h2>
        </div>
        <div class="glass p-8 rounded-[2.5rem]">
            <span class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-2 block">Disponível</span>
            <h2 id="totalAvailable" class="text-2xl font-black text-emerald-400 tracking-tight">R$ 0.00</h2>
        </div>
        <div class="glass p-8 rounded-[2.5rem]">
            <span class="text-[10px] font-black text-rose-500 uppercase tracking-widest mb-2 block">Dívida Ativa</span>
            <h2 id="activeDebt" class="text-2xl font-black text-rose-500 tracking-tight">R$ 0.00</h2>
        </div>
        <div class="glass p-8 rounded-[2.5rem]">
            <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-2 block">Status</span>
            <h2 id="exceededStatus" class="text-[10px] font-black text-emerald-400 mt-1">Saúde Perfeita ✓</h2>
        </div>
    </section>

    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="cardsGrid"></main>

    <!-- MODAL: NOVO CARTÃO -->
    <div id="modalCard" class="fixed inset-0 bg-black/98 backdrop-blur-2xl z-50 hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-lg rounded-[3.5rem] p-12">
            <h3 class="text-2xl font-black mb-8 tracking-tighter uppercase">Configurar Novo Cartão</h3>
            <div class="space-y-6">
                <select id="bankSelect" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none font-bold text-sm">
                    <option value="Neon">Neon</option>
                    <option value="Nubank">Nubank</option>
                    <option value="C6">C6 Bank</option>
                    <option value="PicPay">PicPay</option>
                    <option value="Santander">Santander</option>
                    <option value="Inter">Inter</option>
                    <option value="Bradesco">Bradesco</option>
                    <option value="Itau">Itaú</option>
                    <option value="BB">Banco do Brasil</option>
                    <option value="Caixa">Caixa</option>
                </select>
                <input type="text" id="cardUse" placeholder="Finalidade (Ex: Pets)" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none uppercase font-bold text-sm">
                <input type="number" id="cardLimit" placeholder="Limite Total R$" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 outline-none font-bold text-sm">
                <div class="flex gap-6 pt-6">
                    <button onclick="closeModal(&#39;modalCard&#39;)" class="flex-1 font-bold text-slate-500">Cancelar</button>
                    <button onclick="addCard()" class="flex-1 bg-white text-black font-black py-4 rounded-2xl hover:bg-indigo-600 hover:text-white transition-all uppercase text-xs">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const bankLogos = {
            Neon: `<circle cx="50" cy="50" r="45" fill="#0ea5e9"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">N</text>`,
            Nubank: `<circle cx="50" cy="50" r="45" fill="#9333ea"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">Nu</text>`,
            C6: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#111"/><text x="50" y="65" text-anchor="middle" fill="#facc15" font-weight="900" font-size="40">C6</text>`,
            PicPay: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#21C25E"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="30">PPay</text>`,
            Santander: `<circle cx="50" cy="50" r="45" fill="#EC0000"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">S</text>`,
            Inter: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#ff7a00"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">In</text>`,
            Bradesco: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#cc092f"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">B</text>`,
            Itau: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#ec6608"/><text x="50" y="65" text-anchor="middle" fill="#003399" font-weight="900" font-size="40">I</text>`,
            BB: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#FCF800"/><text x="50" y="65" text-anchor="middle" fill="#003399" font-weight="900" font-size="40">BB</text>`,
            Caixa: `<rect width="90" height="90" x="5" y="5" rx="20" fill="#005ca9"/><text x="50" y="65" text-anchor="middle" fill="white" font-weight="900" font-size="40">X</text>`
        };

        const categories = [
            { id: 'cart', name: 'MERCADO', icon: '🛒' },
            { id: 'pill', name: 'FARMÁCIA', icon: '💊' },
            { id: 'burger', name: 'COMIDA', icon: '🍔' },
            { id: 'gas', name: 'POSTO', icon: '⛽' },
            { id: 'shirt', name: 'ROUPAS', icon: '👕' },
            { id: 'movie', name: 'LAZER', icon: '🎬' },
            { id: 'tech', name: 'TECH', icon: '📱' },
            { id: 'pets', name: 'PETS', icon: '🐾' },
            { id: 'travel', name: 'VIAGEM', icon: '✈️' }
        ];

        let cards = JSON.parse(localStorage.getItem('elite_master_v9')) || [];
        let txs = JSON.parse(localStorage.getItem('tx_elite_v9')) || [];

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        function toggleExpand(id) {
            const cardEl = document.getElementById(`card-${id}`);
            cardEl.classList.toggle('is-expanded');
            cardEl.querySelector('.toggle-btn').innerText = cardEl.classList.contains('is-expanded') ? 'Fechar Detalhes' : 'Gerenciar Despesas';
            lucide.createIcons();
        }

        function addCard() {
            const bank = document.getElementById('bankSelect').value;
            const use = document.getElementById('cardUse').value || 'GERAL';
            const limit = parseFloat(document.getElementById('cardLimit').value);
            if(isNaN(limit)) return;
            cards.push({ id: Date.now(), bank, use: use.toUpperCase(), limit, spent: 0 });
            sync(); closeModal('modalCard');
        }

        function addExpense(cardId) {
            const desc = document.getElementById(`desc-${cardId}`).value;
            const val = parseFloat(document.getElementById(`val-${cardId}`).value);
            const date = document.getElementById(`date-${cardId}`).value;
            const catId = document.getElementById(`cat-${cardId}`).value;
            if(!desc || isNaN(val) || !date) return;
            txs.unshift({ id: Date.now(), cardId, desc, val, date, cat: categories.find(i => i.id === catId) });
            cards.find(c => c.id === cardId).spent += val;
            sync();
        }

        function deleteTx(txId, cardId) {
            const t = txs.find(x => x.id === txId);
            cards.find(c => c.id === cardId).spent -= t.val;
            txs = txs.filter(x => x.id !== txId);
            sync();
        }

        function deleteCard(id) {
            if(confirm("Excluir este cartão?")) {
                cards = cards.filter(c => c.id !== id);
                txs = txs.filter(t => t.cardId !== id);
                sync();
            }
        }

        function sync() {
            localStorage.setItem('elite_master_v9', JSON.stringify(cards));
            localStorage.setItem('tx_elite_v9', JSON.stringify(txs));
            render();
        }

        function render() {
            const grid = document.getElementById('cardsGrid');
            const tSpent = cards.reduce((a, b) => a + b.spent, 0);
            const tLimit = cards.reduce((a, b) => a + b.limit, 0);
            const exceeded = cards.filter(c => c.spent > c.limit);
            const tDebt = exceeded.reduce((a, b) => a + (b.spent - b.limit), 0);

            document.getElementById('totalSpent').innerText = `R$ ${tSpent.toFixed(2)}`;
            document.getElementById('totalAvailable').innerText = `R$ ${Math.max(0, tLimit - tSpent).toFixed(2)}`;
            document.getElementById('activeDebt').innerText = `R$ ${tDebt.toFixed(2)}`;

            const statusEl = document.getElementById('exceededStatus');
            if(exceeded.length > 0) {
                statusEl.innerText = "ALERTA DE DÍVIDA!";
                statusEl.className = "text-[10px] font-black text-rose-500 animate-pulse mt-1";
            } else {
                statusEl.innerText = "Saúde Perfeita ✓";
                statusEl.className = "text-[10px] font-black text-emerald-400 mt-1";
            }

            grid.innerHTML = cards.map(c => {
                const isOver = c.spent > c.limit;
                const perc = Math.min((c.spent/c.limit)*100, 100);
                const cardTxs = txs.filter(t => t.cardId === c.id);

                return `
                <div id="card-${c.id}" class="card-main p-10 flex flex-col transition-all duration-500 ${isOver ? 'card-exceeded' : ''}">
                    <div class="flex justify-between items-start mb-8">
                        <div class="flex gap-5">
                            <div class="w-16 h-16 bg-white rounded-2xl p-2.5 flex items-center justify-center">
                                <svg viewBox="0 0 100 100" class="w-full h-full">${bankLogos[c.bank]}</svg>
                            </div>
                            <div>
                                <h4 class="font-black text-2xl tracking-tighter uppercase">${c.bank}</h4>
                                <span class="bg-indigo-900/30 text-indigo-400 text-[9px] font-black px-4 py-1 rounded-full uppercase border border-indigo-500/20 tracking-widest">${c.use}</span>
                            </div>
                        </div>
                        <button onclick="deleteCard(${c.id})" class="text-slate-800 hover:text-rose-500 transition-colors"><i data-lucide="trash-2" class="w-6 h-6"></i></button>
                    </div>

                    <div>
                        <h2 class="text-4xl font-black ${isOver ? 'text-rose-500' : 'text-white'}">R$ ${c.spent.toFixed(2)}</h2>
                        <div class="flex justify-between text-[10px] font-black text-slate-500 mt-4 uppercase tracking-widest">
                            <span>USO: ${perc.toFixed(0)}%</span>
                            <span>LIMITE: R$ ${c.limit}</span>
                        </div>
                        <div class="h-2 w-full bg-slate-900 rounded-full mt-4 overflow-hidden">
                            <div class="h-full ${isOver ? 'bg-rose-500' : 'bg-indigo-500'} rounded-full transition-all duration-1000" style="width: ${perc}%"></div>
                        </div>
                    </div>

                    <button onclick="toggleExpand(${c.id})" class="toggle-btn w-full mt-8 py-4 bg-slate-800/40 rounded-2xl text-[10px] font-black text-slate-400 hover:bg-indigo-500/10 hover:text-indigo-400 transition-all uppercase tracking-widest">
                        Gerenciar Despesas
                    </button>

                    <div class="expandable-content">
                        <div class="bg-black/30 rounded-[2.5rem] p-6 mb-8 border border-white/5 space-y-4 max-h-[250px] overflow-y-auto custom-scroll">
                            ${cardTxs.map(t => `
                                <div class="item-row p-5 flex justify-between items-center group">
                                    <div class="flex items-center gap-5">
                                        <span class="text-2xl">${t.cat.icon}</span>
                                        <div>
                                            <p class="text-[11px] font-black uppercase text-slate-200 tracking-tight">${t.desc}</p>
                                            <span class="text-[9px] text-slate-600 font-bold">${t.date.split('-').reverse().join('/')}</span>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <span class="text-[11px] font-black text-rose-500">- R$ ${t.val.toFixed(2)}</span>
                                        <button onclick="deleteTx(${t.id}, ${c.id})" class="opacity-0 group-hover:opacity-100 text-slate-700 hover:text-rose-500 transition-all"><i data-lucide="x" class="w-4 h-4"></i></button>
                                    </div>
                                </div>
                            `).join('') || '<p class="text-center text-[10px] text-slate-700 font-black py-4 uppercase">Sem Lançamentos</p>'}
                        </div>

                        <div class="space-y-6 pt-8 border-t border-slate-800/50">
                            <input type="text" id="desc-${c.id}" placeholder="Descrição..." class="w-full bg-transparent border-b border-slate-800 py-3 text-sm outline-none focus:border-indigo-500 font-bold placeholder:text-slate-700 uppercase">
                            <div class="grid grid-cols-2 gap-5">
                                <input type="number" id="val-${c.id}" placeholder="Valor R$" class="bg-slate-900 rounded-2xl p-4 border border-slate-800 text-xs font-black outline-none">
                                <input type="date" id="date-${c.id}" value="${new Date().toISOString().split('T')[0]}" class="bg-slate-900 rounded-2xl p-4 border border-slate-800 text-[11px] font-bold outline-none">
                            </div>
                            <select id="cat-${c.id}" class="w-full bg-slate-900 border border-slate-800 rounded-2xl p-5 text-xs font-black outline-none appearance-none uppercase">
                                ${categories.map(cat => `<option value="${cat.id}">${cat.icon} &nbsp; ${cat.name}</option>`).join('')}
                            </select>
                            <button onclick="addExpense(${c.id})" class="w-full bg-white text-black font-black py-6 rounded-[1.8rem] text-xs hover:bg-indigo-600 hover:text-white transition-all uppercase tracking-tighter shadow-2xl">Confirmar Lançamento</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        render();
    </script>

</body></html>
